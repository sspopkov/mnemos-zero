name: Deploy (Docker + Nginx + Landing SSR)

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mnemos-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    env:
      WEB_ROOT: /var/www/app
      LANDING_DIR: /var/www/landing
      DEPLOY_DIR: /home/runner/deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # --- WEB (Vite SPA) ---
      - name: Install deps for web only
        run: pnpm install --frozen-lockfile --filter ./apps/web...

      - name: Build web
        run: pnpm --filter ./apps/web build

      - name: Publish web to Nginx root
        run: |
          mkdir -p "${RUNNER_TEMP}/mnemos-web"
          rsync -a --delete apps/web/dist/ "${RUNNER_TEMP}/mnemos-web/"
          rsync -a --delete "${RUNNER_TEMP}/mnemos-web/" "$WEB_ROOT/"

      # --- API (Docker) ---
      - name: Sync compose to deploy dir
        run: |
          mkdir -p "$DEPLOY_DIR"
          cp -r deploy/* "$DEPLOY_DIR/"

      - name: Set deploy tag
        run: |
          echo "MNEMOS_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build pruned Landing image
        run: |
          pnpm dlx turbo prune --scope=@mnemos-zero/landing --docker --out-dir .docker/landing

          cp tsconfig.base.json .docker/landing/tsconfig.base.json

          docker build \
            -t mnemos-landing:${MNEMOS_TAG} \
            -f .docker/landing/full/apps/landing/Dockerfile \
            .docker/landing

      - name: Deploy landing (Docker)
        run: |
          cd "$DEPLOY_DIR"
          MNEMOS_TAG=${MNEMOS_TAG} docker compose up -d --force-recreate landing

      - name: Build pruned API runtime image
        run: |
          pnpm dlx turbo prune --scope=@mnemos-zero/api --docker --out-dir .docker/api

          cp tsconfig.base.json .docker/api/tsconfig.base.json

          docker build \
            --target runtime \
            -t mnemos-api:${MNEMOS_TAG} \
            -f .docker/api/full/apps/api/Dockerfile \
            .docker/api

      - name: Build pruned API migration image
        run: |
          docker build \
            --target migrate \
            -t mnemos-api-migrate:${MNEMOS_TAG} \
            -f .docker/api/full/apps/api/Dockerfile \
            .docker/api

      - name: Ensure DB is up
        run: |
          cd "$DEPLOY_DIR"
          MNEMOS_TAG=${MNEMOS_TAG} docker compose up -d --no-recreate db

      - name: Run Prisma migrations
        run: |
          cd "$DEPLOY_DIR"
          MNEMOS_TAG=${MNEMOS_TAG} docker compose run --rm migrate

      - name: Deploy API
        run: |
          cd "$DEPLOY_DIR"
          MNEMOS_TAG=${MNEMOS_TAG} docker compose up -d --force-recreate api

      # --- Health checks (best-effort)
      - name: Health check API
        continue-on-error: true
        run: curl -fsS http://127.0.0.1:4000/api/health || true

      - name: Health check DB
        continue-on-error: true
        run: docker exec mnemos-db pg_isready -U mnemos -d mnemos_prod || true

      - name: Health check Landing SSR
        continue-on-error: true
        run: curl -fsS http://127.0.0.1:3001 || true
