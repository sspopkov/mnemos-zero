services:
  db:
    image: postgres:16
    container_name: mnemos-db
    restart: unless-stopped

    env_file:
      - /etc/mnemos/api.env

    environment:
      POSTGRES_USER: mnemos
      POSTGRES_DB: mnemos_prod

    volumes:
      - /var/lib/mnemos-db:/var/lib/postgresql/data

    ports:
      - "127.0.0.1:5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemos -d mnemos_prod"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: mnemos-api:${MNEMOS_TAG:-latest}
    container_name: mnemos-api
    restart: unless-stopped

    env_file:
      - /etc/mnemos/api.env

    ports:
      - "127.0.0.1:4000:4000"

    depends_on:
      db:
        condition: service_healthy

  migrate:
    image: mnemos-api:${MNEMOS_TAG:-latest}
    container_name: mnemos-api-migrate
    restart: "no"

    env_file:
      - /etc/mnemos/api.env

    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-lc", "npx prisma migrate deploy"]

  landing:
    image: mnemos-landing:${MNEMOS_TAG:-latest}
    container_name: mnemos-landing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "127.0.0.1:3001:3001"
